name: EAS Build & Submit

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'app/**'
      - 'assets/**'
      - 'package.json'
      - 'app.json'
      - 'eas.json'
      - '.github/workflows/eas-submit.yml'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
          - development

jobs:
  # Check if this is a PR merge
  check-merge:
    runs-on: ubuntu-latest
    outputs:
      is-merge: ${{ steps.check.outputs.is-merge }}
      pr-number: ${{ steps.check.outputs.pr-number }}
    steps:
      - name: Check if merge commit
        id: check
        run: |
          # Check if this is a merge commit (has 2+ parents)
          if [[ "$(echo '${{ github.event.head_commit.message }}' | grep -c 'Merge pull request')" -gt 0 ]]; then
            echo "is-merge=true" >> $GITHUB_OUTPUT
            PR_NUM=$(echo '${{ github.event.head_commit.message }}' | grep -oP 'Merge pull request #\K\d+')
            echo "pr-number=$PR_NUM" >> $GITHUB_OUTPUT
          else
            echo "is-merge=false" >> $GITHUB_OUTPUT
            echo "pr-number=" >> $GITHUB_OUTPUT
          fi

  # Generate release notes
  generate-notes:
    runs-on: ubuntu-latest
    needs: check-merge
    outputs:
      release-notes: ${{ steps.notes.outputs.notes }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from app.json
        id: version
        run: |
          VERSION=$(jq -r '.expo.version' app.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [[ -n "$LAST_TAG" ]]; then
            COMMITS=$(git log $LAST_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --since="7 days ago" --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          # Format notes
          NOTES="Release v${{ steps.version.outputs.version }}\n\n"
          NOTES+="Commits since last release:\n"
          
          if [[ -n "$COMMITS" ]]; then
            NOTES+="$COMMITS"
          else
            NOTES+="- Maintenance and bug fixes"
          fi
          
          # Handle multiline output
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # Build and submit with EAS
  eas-build:
    runs-on: ubuntu-latest
    needs: [check-merge, generate-notes]
    if: github.event_name == 'workflow_dispatch' || needs.check-merge.outputs.is-merge == 'true'
    
    strategy:
      matrix:
        platform: [ios, android]
      fail-fast: false
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Determine build profile
        id: profile
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "profile=${{ github.event.inputs.profile }}" >> $GITHUB_OUTPUT
          else
            echo "profile=production" >> $GITHUB_OUTPUT
          fi

      - name: Build and submit (${{ matrix.platform }})
        run: |
          PLATFORM="${{ matrix.platform }}"
          PROFILE="${{ steps.profile.outputs.profile }}"
          
          # Build with auto-submit for production
          if [[ "$PROFILE" == "production" ]]; then
            echo "Building and submitting $PLATFORM..."
            eas build --platform $PLATFORM --profile $PROFILE --auto-submit --non-interactive
          else
            echo "Building $PLATFORM (no auto-submit)..."
            eas build --platform $PLATFORM --profile $PROFILE --non-interactive
          fi

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=✅ *EAS Build Complete*%0APlatform: ${{ matrix.platform }}%0AProfile: ${{ steps.profile.outputs.profile }}%0AVersion: ${{ needs.generate-notes.outputs.version }}%0A%0A${{ needs.generate-notes.outputs.release-notes }}" \
            -d "parse_mode=Markdown" || true

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=❌ *EAS Build Failed*%0APlatform: ${{ matrix.platform }}%0AProfile: ${{ steps.profile.outputs.profile }}%0AWorkflow: ${{ github.workflow }}%0ACommit: ${{ github.sha }}" \
            -d "parse_mode=Markdown" || true

  # Post-build summary
  summary:
    runs-on: ubuntu-latest
    needs: [eas-build, generate-notes]
    if: always() && (github.event_name == 'workflow_dispatch' || needs.check-merge.outputs.is-merge == 'true')
    steps:
      - name: Build Summary
        run: |
          echo "## 🚀 EAS Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.generate-notes.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Notes" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.generate-notes.outputs.release-notes }}" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.eas-build.result }}" == "success" ]]; then
            echo "✅ All builds completed successfully" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.eas-build.result }}" == "failure" ]]; then
            echo "❌ One or more builds failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Build status: ${{ needs.eas-build.result }}" >> $GITHUB_STEP_SUMMARY
          fi
